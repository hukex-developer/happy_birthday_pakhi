<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 18th Birthday Ruksana! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-animation"></div>
    <div class="floating-hearts" id="floatingHearts"></div>
    <div class="particles" id="particles"></div>
    <div id="balloonsContainer"></div>

    <div class="glass-container">
        <div class="header-text">
            <h1 class="title">Happy 18th Birthday</h1>
            <h2 class="name">Ruksuuu</h2>
        </div>

        <div class="cake-wrapper">
            <div class="cake-container" id="cakeContainer">
                <div class="cake" id="cake">
                    <div class="candle" id="candle1">
                        <div class="flame"></div>
                        <div class="candle-text">1</div>
                    </div>
                    <div class="candle" id="candle2">
                        <div class="flame"></div>
                        <div class="candle-text">8</div>
                    </div>

                    <div class="tier tier-top">
                        <div class="frosting-top"></div>
                        <div class="drip drip-1"></div>
                        <div class="drip drip-2"></div>
                        <div class="drip drip-3"></div>
                        <div class="drip drip-4"></div>
                        <div class="drip drip-5"></div>
                    </div>
                    <div class="tier tier-middle">
                        <div class="frosting-middle"></div>
                    </div>
                    <div class="tier tier-bottom">
                        <div class="frosting-bottom"></div>
                    </div>
                </div>
                <div class="plate">
                    <div class="plate-base"></div>
                </div>
                <div class="knife" id="knife"></div>
            </div>
        </div>

        <div class="actions">
            <button id="blowCandlesBtn" class="premium-btn">
                <span class="btn-text">Blow Out Candles</span>
                <span class="btn-glow"></span>
            </button>
            <button id="cutCakeBtn" class="premium-btn hidden">
                <span class="btn-text">Cut The Cake</span>
                <span class="btn-glow"></span>
            </button>
        </div>

        <div class="bengali-message hidden" id="message">
            <div class="msg-content">
                <p class="msg-title">শুভ ১৮তম জন্মদিন, রুকসানা! 🎂✨</p>
                <p>তোমার জীবনের নতুন এই অধ্যায় হোক আরও সুন্দর, আরও আনন্দময়।</p>
                <p>তোমার সব স্বপ্ন সত্যি হোক, আর সবসময় এভাবেই হাসিখুশি থেকো।</p>
                <p class="love-text">অনেক অনেক ভালোবাসা তোমার জন্য! ❤️</p>
            </div>
        </div>

        <div class="credit">With lots of love from <span>Emon</span> ❤️</div>
    </div>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
